name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    # macos-latest, not ubuntu — this is a macOS-first Electron app
    # (electron-builder packaging, native modules like better-sqlite3),
    # so build here in the same OS the app actually targets.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build
